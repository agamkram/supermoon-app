<!DOCTYPE html>
<html lang="en" style="background-color:#020308">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#020308" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SuperMoon" />
  <meta name="description" content="Hi-res 3D Moon with live phase shading for your location." />
  <title>SuperMoon</title>
  <script>
    /* iOS A2HS: lock fill height before first paint.
       Phone: screen.height > inner → use screen.
       iPad: screen.* often *undershoots* inner → add safe-area extra. */
    (function () {
      var n = window.navigator;
      var standalone =
        n.standalone === true ||
        window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches;
      if (!standalone) return;
      var root = document.documentElement;
      root.classList.add("pwa-standalone");
      var iw = window.innerWidth || 0;
      var ih = window.innerHeight || 0;
      var sw = window.screen.width || 0;
      var sh = window.screen.height || 0;
      var screenMax = Math.max(sw, sh);
      var screenMin = Math.min(sw, sh);
      var fillH = ih >= iw ? Math.max(ih, screenMax) : Math.max(ih, screenMin);
      var extra = 0;
      if (Math.min(iw, ih) >= 600 && screenMax < ih - 10) {
        extra = 20; /* refined to real insetB once body exists */
      }
      root.style.setProperty("--pwa-fill-h", fillH + "px");
      root.style.setProperty("--pwa-extra-b", extra + "px");
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preload" href="moon-2k.jpg" as="image" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@500;600&family=Michroma&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="modulepreload" href="https://unpkg.com/three@0.160.0/build/three.module.js" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      color-scheme: dark;
      --text: #e8edf7;
      --muted: #d01828;
      --dim: #b01018;
      --faint: #7a0810;
      --cell: transparent;
      --panel: rgba(8, 12, 20, 0.72);
      --line: #2a3140;
      --moon: #c8d0e0;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      /* Red labels: phone + Mac 8px; iPad 10px (see tablet media) */
      --label-size: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: #020308;
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    /*
     * Full-bleed GL stack. Do NOT use max-height:100dvh — undershoots on iOS.
     * Safari: env() overpaint. Home-screen PWA: height locked to screen (see JS)
     * because innerHeight stays short of screen.height and clips env() overshoot.
     */
    #stage,
    #moon-host,
    #touch-plane {
      position: fixed;
      top: calc(-1 * env(safe-area-inset-top, 0px));
      right: calc(-1 * env(safe-area-inset-right, 0px));
      bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
      left: calc(-1 * env(safe-area-inset-left, 0px));
    }

    html.pwa-standalone,
    html.pwa-standalone body {
      height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
      min-height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
    }

    html.pwa-standalone #stage,
    html.pwa-standalone #moon-host,
    html.pwa-standalone #touch-plane {
      top: 0;
      right: 0;
      bottom: auto;
      left: 0;
      width: 100%;
      height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
    }

    /* Clips the oversized GL canvas; black matches clear color */
    #moon-host {
      z-index: 1;
      overflow: hidden;
      background: #020308;
    }

    /* Gesture layer above canvas, under real UI controls */
    #touch-plane {
      z-index: 2;
      touch-action: none;
      background: transparent;
    }

    #moon-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
      opacity: 0;
      transition: opacity 0.45s ease;
      background: #020308;
    }

    #moon-canvas.is-ready { opacity: 1; }
    /* PWA: shorter fade — long 0→1 reads as a flash on open */
    html.pwa-standalone #moon-canvas {
      transition: opacity 0.12s ease;
    }
    #moon-canvas:active { cursor: grabbing; }

    .chrome {
      position: fixed;
      z-index: 4;
      left: 0;
      right: 0;
      top: 0;
      height: calc(0.375in + env(safe-area-inset-top, 0px));
      padding:
        env(safe-area-inset-top, 0px)
        max(1rem, env(safe-area-inset-right))
        0
        max(1rem, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
    }

    /* Same title treatment as Solar Dashboard (Michroma) */
    .app-title {
      margin: 0;
      font-family: "Michroma", "DM Sans", system-ui, sans-serif;
      font-weight: 400;
      font-size: 0.22in;
      letter-spacing: 0.1em;
      line-height: 1.15;
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
    }

    /*
     * Bottom metrics card (Solar-style cells).
     * pointer-events:none on shell — only controls capture so 2fs works over empty areas.
     * Moon zooms over this; un-zoom / Live to use the boxes.
     */
    .loc-bar {
      position: fixed;
      z-index: 3;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding:
        0.15rem
        max(0.35rem, env(safe-area-inset-right))
        max(0.35rem, env(safe-area-inset-bottom, 0px))
        max(0.35rem, env(safe-area-inset-left));
      background: transparent;
      pointer-events: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }

    .loc-bar input,
    .loc-bar button,
    .loc-bar input[type="range"] {
      pointer-events: auto;
      touch-action: manipulation;
    }

    /* Uniform metric row height (match phase row) */
    :root {
      --m-row-h: 2.2rem;
    }

    .m-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.85fr 1fr 0.9fr;
      grid-auto-rows: var(--m-row-h);
      gap: 2px;
      pointer-events: none;
    }

    /* Station gets most of the row; hi/lo stay compact */
    .m-grid-3 {
      grid-template-columns: minmax(0, 1.8fr) minmax(3.4rem, 0.55fr) minmax(3.4rem, 0.55fr);
      grid-auto-rows: var(--m-row-h);
    }

    /* Rise / high / set + Red + Orbit — three equal times, two equal narrow buttons */
    .m-grid-rise {
      grid-template-columns:
        minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(0, 1.15fr)
        minmax(2.6rem, 0.52fr) minmax(2.6rem, 0.52fr);
      grid-auto-rows: var(--m-row-h);
      align-items: stretch;
    }

    #m-station {
      font-size: 10px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .m-cell-vision {
      justify-content: center;
      align-items: stretch;
      padding: 2px !important;
    }

    .vision-btn {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      line-height: 1;
      padding: 0.12rem 0.2rem;
    }

    .vision-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .vision-btn[aria-pressed="true"] {
      background: rgba(255, 255, 255, 0.16);
    }

    body.is-red-mode .vision-btn {
      background: rgba(90, 8, 10, 0.65);
      border-color: #6a0c10;
      color: var(--text);
    }

    body.is-red-mode .vision-btn[aria-pressed="true"] {
      background: rgba(130, 12, 16, 0.85);
    }

    .m-cell {
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 5px 3px;
      min-width: 0;
      min-height: var(--m-row-h);
      height: var(--m-row-h);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }

    .m-cell .k {
      font-size: var(--label-size);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 1.05;
      flex: 0 0 auto;
    }

    .m-cell .v {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 0 0 auto;
    }

    .m-cell .v.sm { font-size: 11px; }
    .m-cell .v.moon {
      color: var(--moon);
      font-size: 11px;
      letter-spacing: -0.03em;
    }

    /*
     * Tablets (iPad and similar): phone landscape is excluded via min-height.
     * Coarse pointer + both sides ≥600px ≈ tablet class across platforms.
     */
    @media (pointer: coarse) and (min-width: 600px) and (min-height: 600px) {
      :root {
        --m-row-h: 2.85rem;
        --label-size: 10px;
      }

      .loc-bar {
        max-width: 620px;
        gap: 0.28rem;
        padding-left: max(0.55rem, env(safe-area-inset-left));
        padding-right: max(0.55rem, env(safe-area-inset-right));
      }

      .m-grid,
      .m-grid-3,
      .m-grid-rise {
        gap: 3px;
      }

      .m-cell {
        padding: 3px 8px 4px;
        border-radius: 8px;
      }

      .m-cell .k {
        letter-spacing: 0.05em;
      }

      .m-cell .v {
        font-size: 15px;
      }

      .m-cell .v.sm {
        font-size: 14px;
      }

      .m-cell .v.moon {
        font-size: 14px;
      }

      #m-station {
        font-size: 12px;
      }

      .m-grid-rise {
        grid-template-columns:
          minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(0, 1.15fr)
          minmax(3.2rem, 0.52fr) minmax(3.2rem, 0.52fr);
      }

      .vision-btn {
        font-size: 12px;
        border-radius: 8px;
      }

      .loc-strip {
        gap: 3px;
      }

      .loc-card {
        max-height: 3.2rem;
        border-radius: 8px;
      }

      .loc-card-place,
      .loc-card.hemi-card {
        padding: 3px 8px 4px;
        gap: 4px;
      }

      .loc-place-row {
        min-height: 1.45rem;
        height: 1.45rem;
        gap: 0.35rem;
      }

      .loc-coords {
        font-size: 13px;
      }

      .loc-place-row button,
      .geo-btn,
      .hemi button {
        font-size: 12px;
        min-height: 1.45rem;
      }

      .hemi {
        min-height: 1.45rem;
        height: 1.45rem;
      }

      .cycle-date {
        font-size: 12px;
      }

      .live-btn {
        font-size: 12px;
        min-height: 1.55rem;
        padding: 0 0.65rem;
      }
    }

    /*
     * Phone landscape only (short height). iPad landscape is taller (≥600px)
     * and keeps the normal / tablet layouts. Shrink stats so the moon stays visible.
     */
    @media (orientation: landscape) and (max-height: 500px) {
      .chrome {
        height: calc(0.28in + env(safe-area-inset-top, 0px));
      }

      .app-title {
        font-size: 0.16in;
      }

      .loc-bar {
        max-width: min(620px, 96vw);
        gap: 0.06rem;
        padding-top: 0.06rem;
        /* zoom reduces used layout height on iOS (transform would not) */
        zoom: 0.72;
      }

      :root {
        --m-row-h: 1.55rem;
        --label-size: 7px;
      }

      .m-grid,
      .m-grid-3,
      .m-grid-rise {
        gap: 1px;
      }

      .m-cell {
        padding: 1px 4px 2px;
        border-radius: 4px;
      }

      .m-cell .v {
        font-size: 10px;
      }

      .m-cell .v.sm,
      .m-cell .v.moon {
        font-size: 9px;
      }

      .loc-strip {
        gap: 2px;
      }

      .cycle {
        padding: 0.06rem 0.22rem 0.08rem;
        gap: 0.06rem;
      }
    }

    /* Compact location + hemi row (desktop was ballooning under the cycle slider) */
    .loc-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      flex: 0 0 auto;
      align-items: stretch;
      min-height: 0;
    }

    .loc-card {
      display: flex;
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      min-width: 0;
      min-height: 0;
      height: auto;
      max-height: 2.55rem;
      box-sizing: border-box;
    }

    .loc-card-place,
    .loc-card.hemi-card {
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      /* Match .m-cell: label sits in the band between top edge and white value */
      gap: 4px;
      padding: 2px 5px 3px;
    }

    .loc-label,
    .hemi-label {
      font-size: var(--label-size);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 1.05;
      text-align: left;
      margin: 0;
      flex: 0 0 auto;
    }

    .hemi-label {
      text-align: center;
    }

    .loc-place-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 0;
      width: 100%;
      flex: 0 0 auto;
      min-height: 1.15rem;
      height: 1.15rem;
    }

    .loc-coords {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .geo-btn {
      flex: 0 0 auto;
      width: 1.4rem;
      height: 1.15rem;
      min-width: 1.4rem;
      padding: 0 !important;
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      line-height: 0;
    }

    .geo-btn svg {
      width: 12px;
      height: 12px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hemi {
      display: flex;
      gap: 2px;
      flex: 0 0 auto;
      width: 100%;
      min-height: 1.15rem;
      height: 1.15rem;
      align-items: stretch;
    }

    .hemi button {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      height: 100%;
      padding: 0 0.15rem;
      font-size: 8px;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .loc-card button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.08rem 0.26rem;
      cursor: pointer;
      line-height: 1.05;
      white-space: nowrap;
    }

    .hemi button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      line-height: 1.05;
      white-space: nowrap;
    }

    .hemi button.active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
    }

    /* Hidden lat/lon still updated for hemi flip / storage */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Map location picker (Edit) */
    .loc-dialog {
      position: fixed;
      inset: 0;
      z-index: 300;
      margin: 0;
      padding: 0;
      max-width: none;
      max-height: none;
      width: 100%;
      height: 100%;
      border: none;
      background: rgba(2, 3, 8, 0.72);
      color: var(--text);
    }

    .loc-dialog[hidden] {
      display: none !important;
    }

    .loc-dialog-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      max-height: min(78vh, 560px);
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #0a0e16;
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      padding-bottom: max(0.4rem, env(safe-area-inset-bottom));
      box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55);
      pointer-events: auto;
    }

    .loc-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.45rem 0.55rem;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .loc-dialog-head button,
    .loc-dialog-foot button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.28rem 0.55rem;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .loc-dialog-foot button.primary {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .loc-map {
      height: min(48vh, 340px);
      width: 100%;
      background: #12161e;
      z-index: 0;
      touch-action: none;
    }

    .loc-dialog-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.4rem 0.55rem 0.15rem;
    }

    .loc-map-coords {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.is-red-mode .loc-dialog {
      background: rgba(2, 0, 0, 0.8);
    }

    body.is-red-mode .loc-dialog-sheet {
      background: #0a0000;
      border-color: #3a0c0c;
    }

    body.is-red-mode .loc-dialog-head button,
    body.is-red-mode .loc-dialog-foot button {
      background: rgba(40, 4, 4, 0.55);
      border-color: #3a0c0c;
      color: var(--text);
    }

    body.is-red-mode .loc-map {
      background: #0c0000;
      /* Red cast that keeps map labels/roads readable */
      filter: sepia(0.9) hue-rotate(-52deg) saturate(3.8) brightness(0.58) contrast(1.02);
    }

    .cycle {
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.12rem 0.28rem 0.14rem;
      display: grid;
      gap: 0.12rem;
      flex: 0 0 auto;
      position: relative;
      z-index: 2;
    }

    .cycle-date {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .cycle-date .live-tag {
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--dim);
      margin-left: 0.28rem;
    }

    /* Slider shortened; Live sits after it in the freed width */
    .cycle-controls {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .slider-track {
      flex: 1 1 auto;
      min-width: 0;
      height: 22px;
      display: flex;
      align-items: center;
    }

    #phase-slider {
      width: 100%;

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module">
    import { createMoonGlobe } from "./moon.js?v=3";

    const STORAGE_KEY = "moon-globe-loc-v1";
    const TIDE_STATIONS_KEY = "supermoon-noaa-tide-stations-v5";
    /** Name tokens that mark inland / river gauges — drop from nearest pick */
    const INLAND_STATION_RE =
      /\b(creek|bayou|slough|plantation|drawbridge|highway bridge|railroad bridge|mi\.?\s*above|miles?\s+above|above\s+(entrance|mouth)|ferry landing)\b/i;
    const SYNODIC = 29.530588853;
    const MOON_RADIUS_KM = 1737.4;
    const MI_PER_KM = 0.621371;
    /** Mean full-moon angular diameter (arcmin) — classic ~31′ */
    const AVG_ANG_ARCMIN = 31.07;
    /** Proxy first (NOAA datagetter often 403s in-browser); direct mdapi fallback for stations */
    const NOAA_STATIONS_PROXY = "/api/noaa-stations";
    const NOAA_STATIONS_DIRECT =
      "https://api.tidesandcurrents.noaa.gov/mdapi/prod/webapi/stations.json?type=tidepredictions";
    const NOAA_HILO_PROXY = "/api/noaa-hilo";
    const NOAA_HILO_DIRECT =
      "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter";

    const canvas = document.getElementById("moon-canvas");
    const status = document.getElementById("status");
    const latInput = document.getElementById("lat-input");
    const lonInput = document.getElementById("lon-input");
    const locCoords = document.getElementById("loc-coords");
    const locLabel = document.getElementById("loc-label");
    const editBtn = document.getElementById("edit-btn");
    const geoBtn = document.getElementById("geo-btn");
    const locDialog = document.getElementById("loc-dialog");
    const locMapEl = document.getElementById("loc-map");
    const locMapCoords = document.getElementById("loc-map-coords");
    const locDialogCancel = document.getElementById("loc-dialog-cancel");
    const locDialogUse = document.getElementById("loc-dialog-use");
    const phaseSlider = document.getElementById("phase-slider");
    const cycleDate = document.getElementById("cycle-date");
    const liveBtn = document.getElementById("live-btn");
    const hemiN = document.getElementById("hemi-n");
    const hemiS = document.getElementById("hemi-s");

    /** @type {import("leaflet").Map | null} */
    let locationMap = null;
    /** @type {import("leaflet").Marker | null} */
    let locationMarker = null;
    let pickLat = 0;
    let pickLon = 0;

    const el = {
      phase: document.getElementById("m-phase"),
      illum: document.getElementById("m-illum"),
      cycle: document.getElementById("m-cycle"),
      tofull: document.getElementById("m-tofull"),
      dist: document.getElementById("m-dist"),
      ang: document.getElementById("m-ang"),
      vsavg: document.getElementById("m-vsavg"),
      vsmax: document.getElementById("m-vsmax"),
      station: document.getElementById("m-station"),
      htide: document.getElementById("m-htide"),
      ltide: document.getElementById("m-ltide"),
      rise: document.getElementById("m-rise"),
      high: document.getElementById("m-high"),
      set: document.getElementById("m-set"),
    };

    let previewMode = false;
    let previewRaf = 0;
    let metricsRaf = 0;
    let tideSeq = 0;
    let tideTimer = 0;
    /** Last successfully resolved station label (avoid flash to —) */
    let lastTideStationLabel = "";
    /** @type {Promise<Array<{id:string,lat:number,lng:number,name?:string,state?:string}>> | null} */
    let stationsPromise = null;
    /** @type {{ yr: number, maxAng: number } | null} */
    let yearMaxCache = null;

    function fmtCoord(n, pos, neg) {
      const a = Math.abs(n);
      const hemi = n >= 0 ? pos : neg;
      return `${a.toFixed(2)}°${hemi}`;
    }

    function fmtTime(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "—";
      let h = date.getHours();
      const m = date.getMinutes();
      const ap = h >= 12 ? "p" : "a";
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2, "0")}${ap}`;
    }

    function fmtDateTime(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "—";
      const mon = date.toLocaleString(undefined, { month: "short" });
      const day = date.getDate();
      return `${mon} ${day} · ${fmtTime(date)}`;
    }

    function ymdCompact(d) {
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, "0");
      const day = String(d.getUTCDate()).padStart(2, "0");
      return `${y}${m}${day}`;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const p1 = (lat1 * Math.PI) / 180;
      const p2 = (lat2 * Math.PI) / 180;
      const dp = ((lat2 - lat1) * Math.PI) / 180;
      const dl = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dp / 2) ** 2 +
        Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) ** 2;
      return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
    }

    function normalizeStationList(rawList, { requireTypeR = false } = {}) {
      return (rawList || [])
        .filter(
          (s) =>
            s &&
            s.id &&
            Number.isFinite(Number(s.lat)) &&
            Number.isFinite(Number(s.lng)) &&
            (!requireTypeR || s.type === "R" || s.type == null)
        )
        .map((s) => ({
          id: String(s.id),
          lat: Number(s.lat),
          lng: Number(s.lng),
          name: String(s.name || s.id),
          state: s.state ? String(s.state).trim() : "",
        }))
        .filter((s) => !INLAND_STATION_RE.test(s.name));
    }

    async function fetchStationsFromNetwork() {
      // 1) Vercel proxy (pre-filtered coastal R stations)
      try {
        const res = await fetch(NOAA_STATIONS_PROXY);
        if (res.ok) {
          const data = await res.json();
          const list = normalizeStationList(data.stations || data.list || []);
          if (list.length >= 10) return list;
        }
      } catch (_) {}

      // 2) Direct NOAA metadata (works with CORS *)
      const res = await fetch(NOAA_STATIONS_DIRECT);
      if (!res.ok) throw new Error("stations fetch failed");
      const data = await res.json();
      const list = normalizeStationList(data.stations || [], {
        requireTypeR: true,
      });
      if (list.length < 10) throw new Error("stations list empty");
      return list;
    }

    function loadTideStations() {
      if (stationsPromise) return stationsPromise;
      stationsPromise = (async () => {
        try {
          const raw = localStorage.getItem(TIDE_STATIONS_KEY);
          if (raw) {
            const o = JSON.parse(raw);
            if (
              o?.ts &&
              Date.now() - o.ts < 7 * 86400000 &&
              Array.isArray(o.list) &&
              o.list.length > 50
            ) {
              return o.list;
            }
          }
        } catch (_) {}

        const list = await fetchStationsFromNetwork();
        try {
          localStorage.setItem(
            TIDE_STATIONS_KEY,
            JSON.stringify({ ts: Date.now(), list })
          );
        } catch (_) {
          /* quota — in-memory only this session */
        }
        return list;
      })().catch((err) => {
        stationsPromise = null;
        throw err;
      });
      return stationsPromise;
    }

    function nearestTideStation(list, lat, lon) {
      let best = null;
      let bestD = Infinity;
      for (let i = 0; i < list.length; i++) {
        const s = list[i];
        const d = haversineKm(lat, lon, s.lat, s.lng);
        if (d < bestD) {
          bestD = d;
          best = s;
        }
      }
      return best ? { station: best, km: bestD } : null;
    }

    function parseNoaaGmt(t) {
      // "2026-07-19 00:36" as UTC when time_zone=gmt
      if (!t || typeof t !== "string") return null;
      const d = new Date(t.replace(" ", "T") + "Z");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    async function fetchHiloPredictions(stationId, when) {
      // Clamp to a window NOAA will accept (scrub dates far out can fail)
      const now = Date.now();
      let t = when instanceof Date ? when.getTime() : now;
      if (!Number.isFinite(t)) t = now;
      const maxPast = now - 20 * 86400000;
      const maxFuture = now + 40 * 86400000;
      t = Math.min(maxFuture, Math.max(maxPast, t));
      const start = new Date(t - 6 * 3600000);
      const end = new Date(t + 48 * 3600000);
      const begin = ymdCompact(start);
      const endStr = ymdCompact(end);

      async function parsePredictions(res) {
        if (!res.ok) throw new Error("predictions failed");
        const data = await res.json();
        if (data?.error?.message) throw new Error(data.error.message);
        if (data?.message === "Forbidden") throw new Error("predictions forbidden");
        if (!Array.isArray(data.predictions)) throw new Error("no predictions");
        return data.predictions;
      }

      // 1) Proxy
      try {
        const res = await fetch(
          `${NOAA_HILO_PROXY}?` +
            new URLSearchParams({
              station: stationId,
              begin,
              end: endStr,
            }).toString()
        );
        return await parsePredictions(res);
      } catch (_) {}

      // 2) Direct (may 403 in some environments)
      const res = await fetch(
        `${NOAA_HILO_DIRECT}?` +
          new URLSearchParams({
            product: "predictions",
            application: "supermoon-app",
            begin_date: begin,
            end_date: endStr,
            datum: "MLLW",
            station: stationId,
            time_zone: "gmt",
            units: "english",
            interval: "hilo",
            format: "json",
          }).toString()
      );
      return parsePredictions(res);
    }

    function nextExtremes(predictions, when) {
      let nextH = null;
      let nextL = null;
      const t0 = when.getTime();
      for (const p of predictions) {
        const dt = parseNoaaGmt(p.t);
        if (!dt || dt.getTime() < t0 - 60000) continue;
        if (p.type === "H" && !nextH) nextH = dt;
        if (p.type === "L" && !nextL) nextL = dt;
        if (nextH && nextL) break;
      }
      // if nothing after when, take first of each in the window
      if (!nextH || !nextL) {
        for (const p of predictions) {
          const dt = parseNoaaGmt(p.t);
          if (!dt) continue;
          if (p.type === "H" && !nextH) nextH = dt;
          if (p.type === "L" && !nextL) nextL = dt;
        }
      }
      return { nextH, nextL };
    }

    /** e.g. "Rhems, Black Mingo Creek, SC" */
    function formatTideStationLabel(st) {
      if (!st) return "—";
      const name = (st.name || st.id || "").trim();
      const state = (st.state || "").trim().toUpperCase();
      if (name && state) {
        // Avoid "Foo, SC, SC" if name already ends with state
        const re = new RegExp(`,\\s*${state}$`, "i");
        if (re.test(name)) return name;
        return `${name}, ${state}`;
      }
      return name || st.id || "—";
    }

    function paintTideFields({ station, title, high, low }, seq) {
      if (seq !== tideSeq) return;
      if (station != null) {
        el.station.textContent = station;
        if (title != null) el.station.title = title;
      }
      if (high != null) el.htide.textContent = high;
      if (low != null) el.ltide.textContent = low;
    }

    /** Nearest coastal NOAA station → name + next high/low. */
    async function updateTidesNow(lat, lon, when) {
      const seq = ++tideSeq;
      if (!Number.isFinite(lat) || !Number.isFinite(lon) || !(when instanceof Date)) {
        paintTideFields({ station: "—", high: "—", low: "—" }, seq);
        return;
      }

      // Keep previous station visible while refreshing (no flash to … / —)
      if (!lastTideStationLabel) {
        paintTideFields({ station: "…", high: "…", low: "…" }, seq);
      } else {
        paintTideFields({ high: "…", low: "…" }, seq);
      }

      try {
        const list = await loadTideStations();
        if (seq !== tideSeq) return;
        const near = nearestTideStation(list, lat, lon);
        if (!near?.station) {
          // Only clear if we never had a good label
          if (!lastTideStationLabel) {
            paintTideFields({ station: "—", high: "—", low: "—" }, seq);
          } else {
            paintTideFields({ high: "—", low: "—" }, seq);
          }
          return;
        }
        const place = formatTideStationLabel(near.station);
        lastTideStationLabel = place;
        paintTideFields(
          {
            station: place,
            title: `${place} · ${Math.round(near.km)} km away`,
          },
          seq
        );

        try {
          const preds = await fetchHiloPredictions(near.station.id, when);
          if (seq !== tideSeq) return;
          const { nextH, nextL } = nextExtremes(preds, when);
          paintTideFields(
            { high: fmtTime(nextH), low: fmtTime(nextL) },
            seq
          );
        } catch (_) {
          paintTideFields({ high: "—", low: "—" }, seq);
        }
      } catch (_) {
        if (seq !== tideSeq) return;
        if (!lastTideStationLabel) {
          paintTideFields({ station: "—", high: "—", low: "—" }, seq);
        } else {
          // Keep last good station; only times fail
          paintTideFields(
            { station: lastTideStationLabel, high: "—", low: "—" },
            seq
          );
        }
      }
    }

    /** Debounce: goLive/onPhase often fire twice back-to-back */
    function updateTides(lat, lon, when) {
      if (tideTimer) clearTimeout(tideTimer);
      tideTimer = setTimeout(() => {
        tideTimer = 0;
        updateTidesNow(lat, lon, when);
      }, 80);
    }

    function saveLoc(lat, lon, source) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ lat, lon, source }));
      } catch (_) {}
    }

    function loadSavedLoc() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (!Number.isFinite(o.lat) || !Number.isFinite(o.lon)) return null;
        return o;
      } catch (_) {
        return null;
      }
    }

    function livePhase01(date = new Date()) {
      const A = globalThis.Astronomy;
      if (!A) return 0;
      return (((A.MoonPhase(date) % 360) + 360) % 360) / 360;
    }

    /**
     * True new→new cycle: phase 0 = last new moon (relative to now),
     * phase 1 = next new. Live phase lands the thumb on “today”.
     * Continuous in phase (no ±½-cycle wrap) so libration stays smooth.
     */
    function dateFromCyclePhase(targetPhase, refDate = new Date()) {
      const p = Math.min(1, Math.max(0, Number(targetPhase) || 0));
      const phaseNow = livePhase01(refDate);
      const lastNewMs = refDate.getTime() - phaseNow * SYNODIC * 86400000;
      return new Date(lastNewMs + p * SYNODIC * 86400000);
    }

    function angArcminFromDistKm(distKm) {
      if (!(distKm > 0)) return NaN;
      return (2 * Math.atan(MOON_RADIUS_KM / distKm) * 180) / Math.PI * 60;
    }

    function yearMaxAngular(A, when) {
      const yr = when.getFullYear();
      if (yearMaxCache && yearMaxCache.yr === yr) return yearMaxCache.maxAng;
      try {
        const start = new Date(Date.UTC(yr, 0, 1));
        const end = new Date(Date.UTC(yr + 1, 0, 1));
        let apsis = A.SearchLunarApsis(start);
        let minDistAu = Infinity;
        for (let i = 0; i < 30; i++) {
          if (apsis.time.date >= end) break;
          // kind 0 = perigee (closest)
          if (apsis.kind === 0 || apsis.kind === "Pericenter") {
            minDistAu = Math.min(minDistAu, apsis.dist_au);
          }
          apsis = A.NextLunarApsis(apsis);
        }
        if (!Number.isFinite(minDistAu) || minDistAu <= 0) {
          yearMaxCache = { yr, maxAng: AVG_ANG_ARCMIN * 1.08 };
          return yearMaxCache.maxAng;
        }
        const maxAng = angArcminFromDistKm(minDistAu * A.KM_PER_AU);
        yearMaxCache = { yr, maxAng };
        return maxAng;
      } catch (_) {
        return AVG_ANG_ARCMIN * 1.08;
      }
    }

    function computeMetrics(info) {
      const A = globalThis.Astronomy;
      if (!A || !info) return null;
      const when = info.when instanceof Date ? info.when : new Date(info.when);
      const lat = Number(info.lat);
      const lon = Number(info.lon);
      const phase01 = Number(info.phase01) || 0;
      const frac = Number(info.fraction);

      let distKm = NaN;
      let ang = NaN;
      try {
        const illum = A.Illumination(A.Body.Moon, when);
        distKm = illum.geo_dist * A.KM_PER_AU;
        ang = angArcminFromDistKm(distKm);
      } catch (_) {}

      let daysToFull = NaN;
      try {
        const full = A.SearchMoonPhase(180, when, 40);
        if (full) {
          daysToFull = (full.date.getTime() - when.getTime()) / 86400000;
          if (daysToFull < 0) daysToFull += SYNODIC;
        }
      } catch (_) {}

      let rise = null;
      let high = null;
      let set = null;
      try {
        if (Number.isFinite(lat) && Number.isFinite(lon)) {
          const obs = new A.Observer(lat, lon, 0);
          // One visibility pass: next moonset, rise that starts that pass, meridian (high) between them
          const setEv = A.SearchRiseSet(A.Body.Moon, obs, -1, when, 2);
          if (setEv) {
            set = setEv;
            const riseStart = new Date(setEv.date.getTime() - 36 * 3600000);
            const riseEv = A.SearchRiseSet(A.Body.Moon, obs, +1, riseStart, 2);
            if (riseEv && riseEv.date < setEv.date) {
              rise = riseEv;
              const tr = A.SearchHourAngle(A.Body.Moon, obs, 0, riseEv.date, +1);
              if (tr && tr.time && tr.time.date <= setEv.date) high = tr;
            } else {
              const trStart = new Date(setEv.date.getTime() - 20 * 3600000);
              const tr = A.SearchHourAngle(A.Body.Moon, obs, 0, trStart, +1);
              if (tr && tr.time && tr.time.date <= setEv.date) high = tr;
            }
          }
        }
      } catch (_) {}

      const vsAvg = Number.isFinite(ang)
        ? ((ang - AVG_ANG_ARCMIN) / AVG_ANG_ARCMIN) * 100
        : NaN;
      const maxAng = yearMaxAngular(A, when);
      const vsMax = Number.isFinite(ang) && maxAng > 0 ? (ang / maxAng) * 100 : NaN;

      return {
        name: info.name || "—",
        frac,
        phase01,
        cycleDay: phase01 * SYNODIC,
        daysToFull,
        distMi: distKm * MI_PER_KM,
        ang,
        vsAvg,
        vsMax,
        rise: rise ? rise.date : null,
        high: high && high.time ? high.time.date : null,
        set: set ? set.date : null,
        when,
      };
    }

    function paintMetrics(info) {
      const m = computeMetrics(info);
      if (!m) return;

      // Live mode: keep slider thumb locked to current cycle phase (e.g. day 5.6 → ~19%)
      if (!previewMode && Number.isFinite(m.phase01)) {
        syncSliderToPhase01(m.phase01);
      }

      el.phase.textContent = m.name;
      el.illum.textContent = Number.isFinite(m.frac)
        ? `${Math.round(m.frac * 100)}%`
        : "—";
      el.cycle.textContent = `${m.cycleDay.toFixed(1)}/${SYNODIC.toFixed(1)}`;
      el.tofull.textContent = Number.isFinite(m.daysToFull)
        ? `${m.daysToFull.toFixed(1)} days`
        : "—";
      el.dist.textContent = Number.isFinite(m.distMi)
        ? `${Math.round(m.distMi).toLocaleString()} mi`
        : "—";
      el.ang.textContent = Number.isFinite(m.ang) ? `${m.ang.toFixed(1)}′` : "—";
      if (Number.isFinite(m.vsAvg)) {
        const s = m.vsAvg >= 0 ? "+" : "";
        el.vsavg.textContent = `${s}${m.vsAvg.toFixed(0)}%`;
      } else {
        el.vsavg.textContent = "—";
      }
      el.vsmax.textContent = Number.isFinite(m.vsMax)
        ? `${m.vsMax.toFixed(0)}%`
        : "—";
      el.rise.textContent = fmtTime(m.rise);
      el.high.textContent = fmtTime(m.high);
      el.set.textContent = fmtTime(m.set);

      if (previewMode) {
        cycleDate.innerHTML = `${fmtDateTime(m.when)}<span class="live-tag">Preview</span>`;
      } else {
        cycleDate.innerHTML = `${fmtDateTime(m.when)}<span class="live-tag">Live</span>`;
      }

      // Always nearest NOAA prediction station for observer lat/lon
      updateTides(Number(info.lat), Number(info.lon), m.when);
    }

    function showPhase(info) {
      if (!info) return;
      if (metricsRaf) cancelAnimationFrame(metricsRaf);
      metricsRaf = requestAnimationFrame(() => {
        metricsRaf = 0;
        paintMetrics(info);
      });
    }

    function setLocationTitle(source) {
      if (!locLabel) return;
      // GPS / device locate → “Current”; map pick, hemi test, saved non-GPS → “Chosen”
      const isCurrent = source === "gps";
      locLabel.textContent = isCurrent ? "Current location" : "Chosen location";
    }

    function showLoc(lat, lon, source) {
      latInput.value = Number(lat).toFixed(4);
      lonInput.value = Number(lon).toFixed(4);
      locCoords.textContent = `${fmtCoord(lat, "N", "S")} · ${fmtCoord(lon, "E", "W")}`;
      const south = Number(lat) < 0;
      hemiN.classList.toggle("active", !south);
      hemiS.classList.toggle("active", south);
      if (source != null) setLocationTitle(source);
    }

    function setHemisphere(southern) {
      const latAbs = Math.abs(Number(latInput.value) || 35);
      const lon = Number(lonInput.value) || 0;
      const lat = southern ? -latAbs : latAbs;
      applyLocation(lat, lon, "hemi");
      if (!previewMode) goLive();
    }

    function setLiveUI() {
      if (!liveBtn) return;
      liveBtn.classList.toggle("is-preview", previewMode);
      liveBtn.classList.toggle("is-live", !previewMode);
      liveBtn.textContent = previewMode ? "Use live" : "Live";
    }

    /** Put slider thumb at phase 0…1 (new→new). Matches cycle-day metric. */
    function syncSliderToPhase01(phase01) {
      if (!phaseSlider) return;
      const p = Number(phase01);
      if (!Number.isFinite(p)) return;
      const v = Math.round(Math.min(1, Math.max(0, p)) * 1000);
      phaseSlider.value = String(v);
    }

    function goLive() {
      previewMode = false;
      try {
        if (typeof closeLocationDialog === "function") closeLocationDialog();
      } catch (_) {}
      const now = new Date();
      let info = null;
      try {
        info = globe.setTime(now, { lockOrient: false });
        globe.resetView();
      } catch (err) {
        console.warn("goLive setTime/resetView", err);
      }
      // Prefer ephemeris phase (same source as “Cycle day”) so thumb matches
      const p =
        info && Number.isFinite(info.phase01)
          ? info.phase01
          : livePhase01(now);
      syncSliderToPhase01(p);
      showPhase(info || globe.getPhaseInfo());
      setLiveUI();
    }

    let redModeOn = false;
    const visionBtn = document.getElementById("vision-btn");
    const orbitBtn = document.getElementById("orbit-btn");

    function setRedMode(on) {
      redModeOn = !!on;
      document.body.classList.toggle("is-red-mode", redModeOn);
      // Label = what you get when you press (next action)
      visionBtn.textContent = redModeOn ? "White" : "Red";
      visionBtn.setAttribute("aria-pressed", redModeOn ? "true" : "false");
      visionBtn.title = redModeOn
        ? "Return to normal (white) display"
        : "Night vision: red display for dark-adapted eyes";
    }

    function toggleRedMode() {
      setRedMode(!redModeOn);
    }

    visionBtn.addEventListener("click", (e) => {
      e.preventDefault();
      toggleRedMode();
    });

    function setOrbitUI(on) {
      const active = !!on;
      orbitBtn.setAttribute("aria-pressed", active ? "true" : "false");
      orbitBtn.title = active
        ? "Stop continuous moon orbit"
        : "Slow continuous moon orbit (tap again to stop)";
    }

    orbitBtn.addEventListener("click", (e) => {
      e.preventDefault();
      const next = !globe.isOrbiting();
      globe.setOrbiting(next);
      setOrbitUI(next);
    });

    window.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!locDialog.hidden) {
        closeLocationDialog();
        return;
      }
      if (redModeOn) setRedMode(false);
      if (globe.isOrbiting()) {
        globe.setOrbiting(false);
        setOrbitUI(false);
      }
    });

    const globe = createMoonGlobe(canvas, {
      onReady() {
        canvas.classList.add("is-ready");
        status.textContent = "";
        status.style.display = "none";
      },
      onQuality() {
        /* quality upgrades stay silent */
      },
      onPhase: showPhase,
    });

    function applyLocation(lat, lon, source) {
      globe.setObserver(lat, lon);
      if (!previewMode) {
        globe.setTime(new Date(), { lockOrient: false });
      } else {
        const phase = Number(phaseSlider.value) / 1000;
        globe.setTime(dateFromCyclePhase(phase), {
          lockOrient: true,
          orientDate: new Date(),
        });
      }
      showLoc(lat, lon, source);
      showPhase(globe.getPhaseInfo());
      saveLoc(lat, lon, source);
    }

    phaseSlider.addEventListener("input", () => {
      previewMode = true;
      setLiveUI();
      const phase = Number(phaseSlider.value) / 1000;
      const date = dateFromCyclePhase(phase);
      if (previewRaf) cancelAnimationFrame(previewRaf);
      previewRaf = requestAnimationFrame(() => {
        previewRaf = 0;
        // Freeze sky pose while scrubbing so only terminator walks the cycle
        globe.setTime(date, { lockOrient: true, orientDate: new Date() });
        showPhase(globe.getPhaseInfo());
      });
    });

    function onLiveActivate(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      goLive();
    }
    // click + pointerup: iOS sometimes eats click after touch-action wars
    liveBtn.addEventListener("click", onLiveActivate);
    liveBtn.addEventListener(
      "pointerup",
      (e) => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        onLiveActivate(e);
      },
      { passive: false }
    );
    hemiN.addEventListener("click", () => setHemisphere(false));
    hemiS.addEventListener("click", () => setHemisphere(true));

    function updateMapCoordsDisplay() {
      locMapCoords.textContent = `${fmtCoord(pickLat, "N", "S")} · ${fmtCoord(pickLon, "E", "W")}`;
    }

    function setMapPin(lat, lon, pan = false) {
      pickLat = lat;
      pickLon = lon;
      updateMapCoordsDisplay();
      if (!locationMap || typeof L === "undefined") return;
      if (!locationMarker) {
        locationMarker = L.marker([lat, lon], { draggable: true }).addTo(
          locationMap
        );
        locationMarker.on("dragend", () => {
          const p = locationMarker.getLatLng();
          setMapPin(p.lat, p.lng);
        });
      } else {
        locationMarker.setLatLng([lat, lon]);
      }
      if (pan) locationMap.setView([lat, lon], locationMap.getZoom());
    }

    function initLocationMap() {
      if (locationMap || typeof L === "undefined") return;
      locationMap = L.map(locMapEl, {
        zoomControl: true,
        attributionControl: true,
      });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap",
      }).addTo(locationMap);
      locationMap.on("click", (e) => setMapPin(e.latlng.lat, e.latlng.lng));
    }

    function closeLocationDialog() {
      locDialog.hidden = true;
    }

    function openLocationDialog() {
      const startLat = Number(latInput.value);
      const startLon = Number(lonInput.value);
      pickLat = Number.isFinite(startLat) ? startLat : 0;
      pickLon = Number.isFinite(startLon) ? startLon : 0;
      locDialog.hidden = false;
      requestAnimationFrame(() => {
        initLocationMap();
        if (!locationMap) return;
        const hasLoc =
          Number.isFinite(startLat) &&
          Number.isFinite(startLon) &&
          !(startLat === 0 && startLon === 0);
        const zoom = hasLoc ? 10 : 3;
        locationMap.setView([pickLat, pickLon], zoom);
        setMapPin(pickLat, pickLon);
        locationMap.invalidateSize();
      });
    }

    editBtn.addEventListener("click", () => openLocationDialog());
    locDialogCancel.addEventListener("click", () => closeLocationDialog());
    locDialog.addEventListener("click", (e) => {
      // Tap dimmed backdrop (not the sheet) closes
      if (e.target === locDialog) closeLocationDialog();
    });
    locDialogUse.addEventListener("click", () => {
      if (!Number.isFinite(pickLat) || !Number.isFinite(pickLon)) return;
      applyLocation(pickLat, pickLon, "map");
      closeLocationDialog();
      if (!previewMode) goLive();
    });

    geoBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        locCoords.textContent = "GPS unavailable";
        openLocationDialog();
        return;
      }
      locCoords.textContent = "Locating…";
      geoBtn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          geoBtn.disabled = false;
          applyLocation(pos.coords.latitude, pos.coords.longitude, "gps");
          if (!previewMode) goLive();
        },
        (err) => {
          geoBtn.disabled = false;
          locCoords.textContent =
            err.code === 1 ? "Permission denied" : "Location failed";
          openLocationDialog();
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
      );
    });

    function requestUserLocation({ force = false } = {}) {
      if (!navigator.geolocation) {
        if (force) openLocationDialog();
        return;
      }
      // Browsers block GPS on plain http://LAN-IP — need https (or localhost)
      if (
        typeof window.isSecureContext === "boolean" &&
        !window.isSecureContext &&
        location.hostname !== "localhost" &&
        location.hostname !== "127.0.0.1"
      ) {
        locCoords.title =
          "GPS needs HTTPS. Use the locate icon after trusting the local cert, or Edit map.";
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          applyLocation(pos.coords.latitude, pos.coords.longitude, "gps");
          if (!previewMode) goLive();
        },
        () => {
          if (force) openLocationDialog();
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
      );
    }

    // Boot: saved place first (instant), then always try GPS to refine
    const saved = loadSavedLoc();
    if (saved) {
      // Keep prior source if stored (gps vs map/hemi); default to chosen
      applyLocation(saved.lat, saved.lon, saved.source || "saved");
    } else {
      applyLocation(0, 0, "default");
    }
    goLive();
    requestAnimationFrame(() => {
      goLive();
      requestUserLocation({ force: !saved });
    });

    setInterval(() => {
      if (previewMode) return;
      globe.setTime(new Date(), { lockOrient: false });
      const p = livePhase01();
      phaseSlider.value = String(Math.round(p * 1000));
      showPhase(globe.getPhaseInfo());
    }, 60000);

    function pwaFillHeightPx() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      const sw = window.screen.width || 0;
      const sh = window.screen.height || 0;
      // iOS keeps screen.* in portrait metrics; pick the axis for current height.
      if (ih >= iw) return Math.max(ih, Math.max(sw, sh));
      return Math.max(ih, Math.min(sw, sh));
    }

    /** iPad PWA: screen.* undershoots CSS inner — phone uses screen height instead. */
    function pwaExtraBottomPx() {
      const iw = window.innerWidth || 0;
      const ih = window.innerHeight || 0;
      const sw = window.screen.width || 0;
      const sh = window.screen.height || 0;
      const screenMax = Math.max(sw, sh);
      if (Math.min(iw, ih) < 600) return 0;
      if (screenMax >= ih - 10) return 0;
      return Math.max(readSafeInsetBottom(), 20);
    }

    function syncPwaFillHeight() {
      const root = document.documentElement;
      if (!root.classList.contains("pwa-standalone")) {
        root.style.removeProperty("--pwa-fill-h");
        root.style.removeProperty("--pwa-extra-b");
        return 0;
      }
      const fillH = pwaFillHeightPx();
      const extra = pwaExtraBottomPx();
      root.style.setProperty("--pwa-fill-h", `${fillH}px`);
      root.style.setProperty("--pwa-extra-b", `${extra}px`);
      return fillH + extra;
    }

    function readSafeInsetBottom() {
      const probe = document.createElement("div");
      probe.style.cssText =
        "position:fixed;visibility:hidden;pointer-events:none;padding-bottom:env(safe-area-inset-bottom,0px)";
      document.body.appendChild(probe);
      const px = parseFloat(getComputedStyle(probe).paddingBottom) || 0;
      probe.remove();
      return px;
    }

    function onResize() {
      syncPwaFillHeight();
      globe.fitToHost();
    }
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", () => {
      setTimeout(onResize, 50);
      setTimeout(onResize, 300);
    });
    window.visualViewport?.addEventListener("resize", onResize);
    window.addEventListener("pageshow", onResize);
    syncPwaFillHeight();
    onResize();
    setTimeout(onResize, 100);
    setTimeout(onResize, 400);
  </script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
