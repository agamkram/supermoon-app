<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#020308" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SuperMoon" />
  <meta name="description" content="Hi-res 3D Moon with live phase shading for your location." />
  <title>SuperMoon</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preload" href="moon-2k.jpg" as="image" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@500;600&family=Michroma&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="modulepreload" href="https://unpkg.com/three@0.160.0/build/three.module.js" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      color-scheme: dark;
      --text: #e8edf7;
      --muted: #8b95a8;
      --dim: #7a8496;
      --faint: #4a5366;
      --cell: #12161e;
      --panel: rgba(8, 12, 20, 0.72);
      --line: #2a3140;
      --moon: #c8d0e0;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: #020308;
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    /* Full visual viewport (incl. iOS home-indicator band) */
    #stage,
    #moon-host,
    #touch-plane {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      max-height: 100dvh;
    }

    /* Clips the oversized GL canvas; black matches clear color */
    #moon-host {
      z-index: 1;
      overflow: hidden;
      background: #020308;
    }

    /* Gesture layer above canvas, under real UI controls */
    #touch-plane {
      z-index: 2;
      touch-action: none;
      background: transparent;
    }

    #moon-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    #moon-canvas.is-ready { opacity: 1; }
    #moon-canvas:active { cursor: grabbing; }

    .chrome {
      position: fixed;
      z-index: 4;
      left: 0;
      right: 0;
      top: 0;
      height: calc(0.375in + env(safe-area-inset-top, 0px));
      padding:
        env(safe-area-inset-top, 0px)
        max(1rem, env(safe-area-inset-right))
        0
        max(1rem, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
    }

    /* Same title treatment as Solar Dashboard (Michroma) */
    .app-title {
      margin: 0;
      font-family: "Michroma", "DM Sans", system-ui, sans-serif;
      font-weight: 400;
      font-size: 0.22in;
      letter-spacing: 0.1em;
      line-height: 1.15;
      color: var(--text);
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.55);
    }

    /*
     * Bottom metrics card (Solar-style cells).
     * pointer-events:none on shell — only controls capture so 2fs works over empty areas.
     * Moon zooms over this; un-zoom / Live to use the boxes.
     */
    .loc-bar {
      position: fixed;
      z-index: 3;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding:
        0.15rem
        max(0.35rem, env(safe-area-inset-right))
        max(0.35rem, env(safe-area-inset-bottom))
        max(0.35rem, env(safe-area-inset-left));
      background: linear-gradient(to top, rgba(2, 3, 8, 0.97) 70%, rgba(2, 3, 8, 0.55) 100%);
      pointer-events: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }

    .loc-bar input,
    .loc-bar button,
    .loc-bar input[type="range"] {
      pointer-events: auto;
      touch-action: manipulation;
    }

    /* Uniform metric row height (match phase row) */
    :root {
      --m-row-h: 2.2rem;
    }

    .m-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.85fr 1fr 0.9fr;
      grid-auto-rows: var(--m-row-h);
      gap: 2px;
      pointer-events: none;
    }

    /* Station gets most of the row; hi/lo stay compact */
    .m-grid-3 {
      grid-template-columns: minmax(0, 1.8fr) minmax(3.4rem, 0.55fr) minmax(3.4rem, 0.55fr);
      grid-auto-rows: var(--m-row-h);
    }

    /* Rise / set + night vision toggle */
    .m-grid-rise {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(3.6rem, 0.75fr);
      grid-auto-rows: var(--m-row-h);
      align-items: stretch;
    }

    #m-station {
      font-size: 10px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .m-cell-vision {
      justify-content: center;
      align-items: stretch;
      padding: 2px !important;
    }

    .vision-btn {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      line-height: 1;
      padding: 0.12rem 0.28rem;
    }

    .vision-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    body.is-red-mode .vision-btn {
      background: rgba(70, 10, 10, 0.55);
      border-color: #551010;
      color: var(--text);
    }

    .m-cell {
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 5px 3px;
      min-width: 0;
      min-height: var(--m-row-h);
      height: var(--m-row-h);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
      overflow: hidden;
    }

    .m-cell .k {
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 1.05;
      flex: 0 0 auto;
    }

    .m-cell .v {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 0 0 auto;
    }

    .m-cell .v.sm { font-size: 11px; }
    .m-cell .v.moon {
      color: var(--moon);
      font-size: 11px;
      letter-spacing: -0.03em;
    }

    .loc-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      /* Taller so hemi can stack label above larger N/S buttons */
      min-height: 2.65rem;
      align-items: stretch;
    }

    .loc-card {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 0.22rem;
      min-width: 0;
      min-height: 2.65rem;
      height: 100%;
      box-sizing: border-box;
    }

    .loc-card.hemi-card {
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 3px;
      padding: 3px 0.3rem 4px;
    }

    .loc-coords {
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      flex: 1 1 auto;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .hemi-label {
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 1.05;
      text-align: center;
      margin: 0;
    }

    .hemi {
      display: flex;
      gap: 3px;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }

    .hemi button {
      flex: 1 1 0;
      min-width: 0;
      padding: 0.2rem 0.2rem;
      font-size: 9px;
      letter-spacing: 0.02em;
    }

    .loc-card button,
    .live-btn {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.08rem 0.26rem;
      cursor: pointer;
      line-height: 1.05;
      white-space: nowrap;
    }

    .hemi button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      line-height: 1.05;
      white-space: nowrap;
    }

    .hemi button.active {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
    }

    /* Hidden lat/lon still updated for hemi flip / storage */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Map location picker (Edit) */
    .loc-dialog {
      position: fixed;
      inset: 0;
      z-index: 300;
      margin: 0;
      padding: 0;
      max-width: none;
      max-height: none;
      width: 100%;
      height: 100%;
      border: none;
      background: rgba(2, 3, 8, 0.72);
      color: var(--text);
    }

    .loc-dialog[hidden] {
      display: none !important;
    }

    .loc-dialog-sheet {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      max-height: min(78vh, 560px);
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #0a0e16;
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      padding-bottom: max(0.4rem, env(safe-area-inset-bottom));
      box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55);
      pointer-events: auto;
    }

    .loc-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.45rem 0.55rem;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .loc-dialog-head button,
    .loc-dialog-foot button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.28rem 0.55rem;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .loc-dialog-foot button.primary {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .loc-map {
      height: min(48vh, 340px);
      width: 100%;
      background: #12161e;
      z-index: 0;
      touch-action: none;
    }

    .loc-dialog-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.4rem 0.55rem 0.15rem;
    }

    .loc-map-coords {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.is-red-mode .loc-dialog {
      background: rgba(2, 0, 0, 0.8);
    }

    body.is-red-mode .loc-dialog-sheet {
      background: #0a0000;
      border-color: #3a0c0c;
    }

    body.is-red-mode .loc-dialog-head button,
    body.is-red-mode .loc-dialog-foot button {
      background: rgba(40, 4, 4, 0.55);
      border-color: #3a0c0c;
      color: var(--text);
    }

    .cycle {
      background: var(--cell);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.1rem 0.28rem 0.12rem;
      display: grid;
      gap: 0;
    }

    .cycle-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.3rem;
    }

    .cycle-date {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .cycle-date .live-tag {
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--dim);
      margin-left: 0.28rem;
    }

    .live-btn {
      border-radius: 999px;
      padding: 0.06rem 0.38rem;
      background: rgba(255, 255, 255, 0.1);
      flex: 0 0 auto;
    }

    .live-btn.is-preview {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .slider-track {
      height: 18px;
      display: flex;
      align-items: center;
    }

    #phase-slider {
      width: 100%;
      height: 18px;
      margin: 0;
      accent-color: #c8d4e8;
      cursor: pointer;
    }



    .status {
      position: fixed;
      z-index: 2;
      left: 0;
      right: 0;
      top: calc(0.45in + env(safe-area-inset-top, 0px));
      text-align: center;
      pointer-events: none;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.65;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
    }

    /*
     * Night vision: kill white / bright UI so dark-adapted eyes survive.
     * App stays fully usable. Tap moon (or the badge) to toggle.
     */
    body.is-red-mode {
      --text: #9a2020;
      --muted: #6a1414;
      --dim: #551010;
      --faint: #3a0a0a;
      --cell: #0a0000;
      --line: #3a0c0c;
      --moon: #b02828;
      --panel: rgba(8, 0, 0, 0.92);
      --red-track: #2a0808;
      --red-thumb: #6a1010;
      background: #020000;
      color: var(--text);
      color-scheme: dark;
    }

    body.is-red-mode #moon-host,
    body.is-red-mode #stage {
      background: #020000;
    }

    /* Deeper red cast on the globe */
    body.is-red-mode #moon-host {
      filter: sepia(1) hue-rotate(-54deg) saturate(4.5) brightness(0.42);
    }

    body.is-red-mode .loc-bar {
      background: linear-gradient(
        to top,
        rgba(2, 0, 0, 0.98) 70%,
        rgba(2, 0, 0, 0.6) 100%
      );
    }

    body.is-red-mode .live-btn,
    body.is-red-mode .loc-card button,
    body.is-red-mode .hemi button,
    body.is-red-mode .edit-panel button,
    body.is-red-mode .edit-panel input {
      background: rgba(40, 4, 4, 0.55);
      border-color: #3a0c0c;
      color: var(--text);
      accent-color: #6a1010;
    }

    body.is-red-mode .hemi button.active,
    body.is-red-mode .live-btn.is-preview {
      background: rgba(70, 10, 10, 0.55);
      border-color: #551010;
    }

    body.is-red-mode #phase-slider {
      -webkit-appearance: none;
      appearance: none;
      accent-color: #6a1010;
      background: transparent;
      color: #6a1010;
    }

    /* WebKit / Blink range thumb stays white unless styled explicitly */
    body.is-red-mode #phase-slider::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
      background: var(--red-track);
    }

    body.is-red-mode #phase-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6px;
      border-radius: 50%;
      border: 1px solid #4a0c0c;
      background: var(--red-thumb);
      box-shadow: none;
    }

    body.is-red-mode #phase-slider::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: var(--red-track);
      border: none;
    }

    body.is-red-mode #phase-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #4a0c0c;
      background: var(--red-thumb);
      box-shadow: none;
    }

    body.is-red-mode .app-title {
      color: #8a1818;
      text-shadow: 0 1px 10px rgba(40, 0, 0, 0.7);
    }

    body.is-red-mode .m-cell .v.moon {
      color: #a02020;
    }


  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="stage">
    <div id="moon-host">
      <canvas
        id="moon-canvas"
        aria-label="3D Moon. One finger rotates, pinch zooms, two-finger slide pans. Live resets."
      ></canvas>
    </div>
    <div id="touch-plane" aria-hidden="true"></div>
  </div>

  <header class="chrome">
    <h1 class="app-title">SuperMoon</h1>
  </header>

  <p class="status" id="status" data-state="loading">Loading surface…</p>

  <div class="loc-bar" id="loc-bar">
    <div class="m-grid" aria-label="Lunar metrics">
      <div class="m-cell">
        <div class="k">Phase</div>
        <div class="v moon" id="m-phase">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Illuminated</div>
        <div class="v" id="m-illum">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Cycle day</div>
        <div class="v sm" id="m-cycle">—</div>
      </div>
      <div class="m-cell">
        <div class="k">To full</div>
        <div class="v" id="m-tofull">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Distance</div>
        <div class="v sm" id="m-dist">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Angular size</div>
        <div class="v sm" id="m-ang">—</div>
      </div>
      <div class="m-cell">
        <div class="k">vs average</div>
        <div class="v sm" id="m-vsavg">—</div>
      </div>
      <div class="m-cell">
        <div class="k">vs max mo/yr</div>
        <div class="v sm" id="m-vsmax">—</div>
      </div>
    </div>
    <!-- Row order: metrics 1–2, rise/set/red, tides, location -->
    <div class="m-grid m-grid-rise" aria-label="Moon rise set and display mode">
      <div class="m-cell">
        <div class="k">Moonrise</div>
        <div class="v sm" id="m-rise">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Moonset</div>
        <div class="v sm" id="m-set">—</div>
      </div>
      <div class="m-cell m-cell-vision">
        <button
          type="button"
          class="vision-btn"
          id="vision-btn"
          title="Night vision: red display for dark-adapted eyes"
          aria-pressed="false"
        >
          Red
        </button>
      </div>
    </div>
    <div class="m-grid m-grid-3" aria-label="Tides">
      <div class="m-cell">
        <div class="k">Tide station</div>
        <div class="v sm" id="m-station">—</div>
      </div>
      <div class="m-cell">
        <div class="k">High tide</div>
        <div class="v sm" id="m-htide">—</div>
      </div>
      <div class="m-cell">
        <div class="k">Low tide</div>
        <div class="v sm" id="m-ltide">—</div>
      </div>
    </div>

    <div class="loc-strip">
      <div class="loc-card">
        <div class="loc-coords" id="loc-coords">—</div>
        <button type="button" id="edit-btn" title="Choose location on map">Edit</button>
        <button type="button" id="geo-btn" title="Use device location">Current</button>
      </div>
      <div class="loc-card hemi-card">
        <span class="hemi-label">Hemisphere</span>
        <div class="hemi" role="group" aria-label="Hemisphere">
          <button type="button" id="hemi-n" class="active">Northern</button>
          <button type="button" id="hemi-s">Southern</button>
        </div>
      </div>
    </div>

    <!-- Kept for hemi flip / applyLocation; not shown -->
    <input id="lat-input" class="sr-only" type="number" step="0.0001" min="-90" max="90" value="0" tabindex="-1" aria-hidden="true" />
    <input id="lon-input" class="sr-only" type="number" step="0.0001" min="-180" max="180" value="0" tabindex="-1" aria-hidden="true" />

    <div id="loc-dialog" class="loc-dialog" hidden role="dialog" aria-modal="true" aria-label="Choose location on map">
      <div class="loc-dialog-sheet">
        <div class="loc-dialog-head">
          <span>Tap map to set location</span>
          <button type="button" id="loc-dialog-cancel">Cancel</button>
        </div>
        <div id="loc-map" class="loc-map" role="application" aria-label="Location map"></div>
        <div class="loc-dialog-foot">
          <span class="loc-map-coords" id="loc-map-coords">—</span>
          <button type="button" class="primary" id="loc-dialog-use">Use this place</button>
        </div>
      </div>
    </div>

    <div class="cycle">
      <div class="cycle-top">
        <div class="cycle-date" id="cycle-date">—</div>
        <button type="button" class="live-btn is-live" id="live-btn" title="Reset to live moon">Live</button>
      </div>
      <div class="slider-track">
        <input
          type="range"
          id="phase-slider"
          min="0"
          max="1000"
          value="0"
          step="1"
          aria-label="Scrub through one full lunar cycle"
        />
      </div>
    </div>
  </div>

  <script src="astronomy.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module">
    import { createMoonGlobe } from "./moon.js?v=88";

    const STORAGE_KEY = "moon-globe-loc-v1";
    const TIDE_STATIONS_KEY = "supermoon-noaa-tide-stations-v5";
    /** Name tokens that mark inland / river gauges — drop from nearest pick */
    const INLAND_STATION_RE =
      /\b(creek|bayou|slough|plantation|drawbridge|highway bridge|railroad bridge|mi\.?\s*above|miles?\s+above|above\s+(entrance|mouth)|ferry landing)\b/i;
    const SYNODIC = 29.530588853;
    const MOON_RADIUS_KM = 1737.4;
    const MI_PER_KM = 0.621371;
    /** Mean full-moon angular diameter (arcmin) — classic ~31′ */
    const AVG_ANG_ARCMIN = 31.07;
    /** Proxy first (NOAA datagetter often 403s in-browser); direct mdapi fallback for stations */
    const NOAA_STATIONS_PROXY = "/api/noaa-stations";
    const NOAA_STATIONS_DIRECT =
      "https://api.tidesandcurrents.noaa.gov/mdapi/prod/webapi/stations.json?type=tidepredictions";
    const NOAA_HILO_PROXY = "/api/noaa-hilo";
    const NOAA_HILO_DIRECT =
      "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter";

    const canvas = document.getElementById("moon-canvas");
    const status = document.getElementById("status");
    const latInput = document.getElementById("lat-input");
    const lonInput = document.getElementById("lon-input");
    const locCoords = document.getElementById("loc-coords");
    const editBtn = document.getElementById("edit-btn");
    const geoBtn = document.getElementById("geo-btn");
    const locDialog = document.getElementById("loc-dialog");
    const locMapEl = document.getElementById("loc-map");
    const locMapCoords = document.getElementById("loc-map-coords");
    const locDialogCancel = document.getElementById("loc-dialog-cancel");
    const locDialogUse = document.getElementById("loc-dialog-use");
    const phaseSlider = document.getElementById("phase-slider");
    const cycleDate = document.getElementById("cycle-date");
    const liveBtn = document.getElementById("live-btn");
    const hemiN = document.getElementById("hemi-n");
    const hemiS = document.getElementById("hemi-s");

    /** @type {import("leaflet").Map | null} */
    let locationMap = null;
    /** @type {import("leaflet").Marker | null} */
    let locationMarker = null;
    let pickLat = 0;
    let pickLon = 0;

    const el = {
      phase: document.getElementById("m-phase"),
      illum: document.getElementById("m-illum"),
      cycle: document.getElementById("m-cycle"),
      tofull: document.getElementById("m-tofull"),
      dist: document.getElementById("m-dist"),
      ang: document.getElementById("m-ang"),
      vsavg: document.getElementById("m-vsavg"),
      vsmax: document.getElementById("m-vsmax"),
      station: document.getElementById("m-station"),
      htide: document.getElementById("m-htide"),
      ltide: document.getElementById("m-ltide"),
      rise: document.getElementById("m-rise"),
      set: document.getElementById("m-set"),
    };

    let previewMode = false;
    let sliderAnchorDate = null;
    let sliderAnchorPhase = 0;
    let previewRaf = 0;
    let metricsRaf = 0;
    let tideSeq = 0;
    let tideTimer = 0;
    /** Last successfully resolved station label (avoid flash to —) */
    let lastTideStationLabel = "";
    /** @type {Promise<Array<{id:string,lat:number,lng:number,name?:string,state?:string}>> | null} */
    let stationsPromise = null;
    /** @type {{ yr: number, maxAng: number } | null} */
    let yearMaxCache = null;

    function fmtCoord(n, pos, neg) {
      const a = Math.abs(n);
      const hemi = n >= 0 ? pos : neg;
      return `${a.toFixed(2)}°${hemi}`;
    }

    function fmtTime(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "—";
      let h = date.getHours();
      const m = date.getMinutes();
      const ap = h >= 12 ? "p" : "a";
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2, "0")}${ap}`;
    }

    function fmtDateTime(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "—";
      const mon = date.toLocaleString(undefined, { month: "short" });
      const day = date.getDate();
      return `${mon} ${day} · ${fmtTime(date)}`;
    }

    function ymdCompact(d) {
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, "0");
      const day = String(d.getUTCDate()).padStart(2, "0");
      return `${y}${m}${day}`;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const p1 = (lat1 * Math.PI) / 180;
      const p2 = (lat2 * Math.PI) / 180;
      const dp = ((lat2 - lat1) * Math.PI) / 180;
      const dl = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dp / 2) ** 2 +
        Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) ** 2;
      return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
    }

    function normalizeStationList(rawList, { requireTypeR = false } = {}) {
      return (rawList || [])
        .filter(
          (s) =>
            s &&
            s.id &&
            Number.isFinite(Number(s.lat)) &&
            Number.isFinite(Number(s.lng)) &&
            (!requireTypeR || s.type === "R" || s.type == null)
        )
        .map((s) => ({
          id: String(s.id),
          lat: Number(s.lat),
          lng: Number(s.lng),
          name: String(s.name || s.id),
          state: s.state ? String(s.state).trim() : "",
        }))
        .filter((s) => !INLAND_STATION_RE.test(s.name));
    }

    async function fetchStationsFromNetwork() {
      // 1) Vercel proxy (pre-filtered coastal R stations)
      try {
        const res = await fetch(NOAA_STATIONS_PROXY);
        if (res.ok) {
          const data = await res.json();
          const list = normalizeStationList(data.stations || data.list || []);
          if (list.length >= 10) return list;
        }
      } catch (_) {}

      // 2) Direct NOAA metadata (works with CORS *)
      const res = await fetch(NOAA_STATIONS_DIRECT);
      if (!res.ok) throw new Error("stations fetch failed");
      const data = await res.json();
      const list = normalizeStationList(data.stations || [], {
        requireTypeR: true,
      });
      if (list.length < 10) throw new Error("stations list empty");
      return list;
    }

    function loadTideStations() {
      if (stationsPromise) return stationsPromise;
      stationsPromise = (async () => {
        try {
          const raw = localStorage.getItem(TIDE_STATIONS_KEY);
          if (raw) {
            const o = JSON.parse(raw);
            if (
              o?.ts &&
              Date.now() - o.ts < 7 * 86400000 &&
              Array.isArray(o.list) &&
              o.list.length > 50
            ) {
              return o.list;
            }
          }
        } catch (_) {}

        const list = await fetchStationsFromNetwork();
        try {
          localStorage.setItem(
            TIDE_STATIONS_KEY,
            JSON.stringify({ ts: Date.now(), list })
          );
        } catch (_) {
          /* quota — in-memory only this session */
        }
        return list;
      })().catch((err) => {
        stationsPromise = null;
        throw err;
      });
      return stationsPromise;
    }

    function nearestTideStation(list, lat, lon) {
      let best = null;
      let bestD = Infinity;
      for (let i = 0; i < list.length; i++) {
        const s = list[i];
        const d = haversineKm(lat, lon, s.lat, s.lng);
        if (d < bestD) {
          bestD = d;
          best = s;
        }
      }
      return best ? { station: best, km: bestD } : null;
    }

    function parseNoaaGmt(t) {
      // "2026-07-19 00:36" as UTC when time_zone=gmt
      if (!t || typeof t !== "string") return null;
      const d = new Date(t.replace(" ", "T") + "Z");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    async function fetchHiloPredictions(stationId, when) {
      // Clamp to a window NOAA will accept (scrub dates far out can fail)
      const now = Date.now();
      let t = when instanceof Date ? when.getTime() : now;
      if (!Number.isFinite(t)) t = now;
      const maxPast = now - 20 * 86400000;
      const maxFuture = now + 40 * 86400000;
      t = Math.min(maxFuture, Math.max(maxPast, t));
      const start = new Date(t - 6 * 3600000);
      const end = new Date(t + 48 * 3600000);
      const begin = ymdCompact(start);
      const endStr = ymdCompact(end);

      async function parsePredictions(res) {
        if (!res.ok) throw new Error("predictions failed");
        const data = await res.json();
        if (data?.error?.message) throw new Error(data.error.message);
        if (data?.message === "Forbidden") throw new Error("predictions forbidden");
        if (!Array.isArray(data.predictions)) throw new Error("no predictions");
        return data.predictions;
      }

      // 1) Proxy
      try {
        const res = await fetch(
          `${NOAA_HILO_PROXY}?` +
            new URLSearchParams({
              station: stationId,
              begin,
              end: endStr,
            }).toString()
        );
        return await parsePredictions(res);
      } catch (_) {}

      // 2) Direct (may 403 in some environments)
      const res = await fetch(
        `${NOAA_HILO_DIRECT}?` +
          new URLSearchParams({
            product: "predictions",
            application: "supermoon-app",
            begin_date: begin,
            end_date: endStr,
            datum: "MLLW",
            station: stationId,
            time_zone: "gmt",
            units: "english",
            interval: "hilo",
            format: "json",
          }).toString()
      );
      return parsePredictions(res);
    }

    function nextExtremes(predictions, when) {
      let nextH = null;
      let nextL = null;
      const t0 = when.getTime();
      for (const p of predictions) {
        const dt = parseNoaaGmt(p.t);
        if (!dt || dt.getTime() < t0 - 60000) continue;
        if (p.type === "H" && !nextH) nextH = dt;
        if (p.type === "L" && !nextL) nextL = dt;
        if (nextH && nextL) break;
      }
      // if nothing after when, take first of each in the window
      if (!nextH || !nextL) {
        for (const p of predictions) {
          const dt = parseNoaaGmt(p.t);
          if (!dt) continue;
          if (p.type === "H" && !nextH) nextH = dt;
          if (p.type === "L" && !nextL) nextL = dt;
        }
      }
      return { nextH, nextL };
    }

    /** e.g. "Rhems, Black Mingo Creek, SC" */
    function formatTideStationLabel(st) {
      if (!st) return "—";
      const name = (st.name || st.id || "").trim();
      const state = (st.state || "").trim().toUpperCase();
      if (name && state) {
        // Avoid "Foo, SC, SC" if name already ends with state
        const re = new RegExp(`,\\s*${state}$`, "i");
        if (re.test(name)) return name;
        return `${name}, ${state}`;
      }
      return name || st.id || "—";
    }

    function paintTideFields({ station, title, high, low }, seq) {
      if (seq !== tideSeq) return;
      if (station != null) {
        el.station.textContent = station;
        if (title != null) el.station.title = title;
      }
      if (high != null) el.htide.textContent = high;
      if (low != null) el.ltide.textContent = low;
    }

    /** Nearest coastal NOAA station → name + next high/low. */
    async function updateTidesNow(lat, lon, when) {
      const seq = ++tideSeq;
      if (!Number.isFinite(lat) || !Number.isFinite(lon) || !(when instanceof Date)) {
        paintTideFields({ station: "—", high: "—", low: "—" }, seq);
        return;
      }

      // Keep previous station visible while refreshing (no flash to … / —)
      if (!lastTideStationLabel) {
        paintTideFields({ station: "…", high: "…", low: "…" }, seq);
      } else {
        paintTideFields({ high: "…", low: "…" }, seq);
      }

      try {
        const list = await loadTideStations();
        if (seq !== tideSeq) return;
        const near = nearestTideStation(list, lat, lon);
        if (!near?.station) {
          // Only clear if we never had a good label
          if (!lastTideStationLabel) {
            paintTideFields({ station: "—", high: "—", low: "—" }, seq);
          } else {
            paintTideFields({ high: "—", low: "—" }, seq);
          }
          return;
        }
        const place = formatTideStationLabel(near.station);
        lastTideStationLabel = place;
        paintTideFields(
          {
            station: place,
            title: `${place} · ${Math.round(near.km)} km away`,
          },
          seq
        );

        try {
          const preds = await fetchHiloPredictions(near.station.id, when);
          if (seq !== tideSeq) return;
          const { nextH, nextL } = nextExtremes(preds, when);
          paintTideFields(
            { high: fmtTime(nextH), low: fmtTime(nextL) },
            seq
          );
        } catch (_) {
          paintTideFields({ high: "—", low: "—" }, seq);
        }
      } catch (_) {
        if (seq !== tideSeq) return;
        if (!lastTideStationLabel) {
          paintTideFields({ station: "—", high: "—", low: "—" }, seq);
        } else {
          // Keep last good station; only times fail
          paintTideFields(
            { station: lastTideStationLabel, high: "—", low: "—" },
            seq
          );
        }
      }
    }

    /** Debounce: goLive/onPhase often fire twice back-to-back */
    function updateTides(lat, lon, when) {
      if (tideTimer) clearTimeout(tideTimer);
      tideTimer = setTimeout(() => {
        tideTimer = 0;
        updateTidesNow(lat, lon, when);
      }, 80);
    }

    function saveLoc(lat, lon, source) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ lat, lon, source }));
      } catch (_) {}
    }

    function loadSavedLoc() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (!Number.isFinite(o.lat) || !Number.isFinite(o.lon)) return null;
        return o;
      } catch (_) {
        return null;
      }
    }

    function livePhase01(date = new Date()) {
      const A = globalThis.Astronomy;
      if (!A) return 0;
      return (((A.MoonPhase(date) % 360) + 360) % 360) / 360;
    }

    function phaseDelta(from, to) {
      let d = to - from;
      if (d > 0.5) d -= 1;
      if (d < -0.5) d += 1;
      return d;
    }

    function dateFromPhaseOffset(anchorDate, anchorPhase, targetPhase) {
      const delta = phaseDelta(anchorPhase, targetPhase);
      return new Date(anchorDate.getTime() + delta * SYNODIC * 86400000);
    }

    function angArcminFromDistKm(distKm) {
      if (!(distKm > 0)) return NaN;
      return (2 * Math.atan(MOON_RADIUS_KM / distKm) * 180) / Math.PI * 60;
    }

    function yearMaxAngular(A, when) {
      const yr = when.getFullYear();
      if (yearMaxCache && yearMaxCache.yr === yr) return yearMaxCache.maxAng;
      try {
        const start = new Date(Date.UTC(yr, 0, 1));
        const end = new Date(Date.UTC(yr + 1, 0, 1));
        let apsis = A.SearchLunarApsis(start);
        let minDistAu = Infinity;
        for (let i = 0; i < 30; i++) {
          if (apsis.time.date >= end) break;
          // kind 0 = perigee (closest)
          if (apsis.kind === 0 || apsis.kind === "Pericenter") {
            minDistAu = Math.min(minDistAu, apsis.dist_au);
          }
          apsis = A.NextLunarApsis(apsis);
        }
        if (!Number.isFinite(minDistAu) || minDistAu <= 0) {
          yearMaxCache = { yr, maxAng: AVG_ANG_ARCMIN * 1.08 };
          return yearMaxCache.maxAng;
        }
        const maxAng = angArcminFromDistKm(minDistAu * A.KM_PER_AU);
        yearMaxCache = { yr, maxAng };
        return maxAng;
      } catch (_) {
        return AVG_ANG_ARCMIN * 1.08;
      }
    }

    function computeMetrics(info) {
      const A = globalThis.Astronomy;
      if (!A || !info) return null;
      const when = info.when instanceof Date ? info.when : new Date(info.when);
      const lat = Number(info.lat);
      const lon = Number(info.lon);
      const phase01 = Number(info.phase01) || 0;
      const frac = Number(info.fraction);

      let distKm = NaN;
      let ang = NaN;
      try {
        const illum = A.Illumination(A.Body.Moon, when);
        distKm = illum.geo_dist * A.KM_PER_AU;
        ang = angArcminFromDistKm(distKm);
      } catch (_) {}

      let daysToFull = NaN;
      try {
        const full = A.SearchMoonPhase(180, when, 40);
        if (full) {
          daysToFull = (full.date.getTime() - when.getTime()) / 86400000;
          if (daysToFull < 0) daysToFull += SYNODIC;
        }
      } catch (_) {}

      let rise = null;
      let set = null;
      try {
        if (Number.isFinite(lat) && Number.isFinite(lon)) {
          const obs = new A.Observer(lat, lon, 0);
          // +1 rise, −1 set; search window 1 day
          const dayStart = new Date(when);
          dayStart.setHours(0, 0, 0, 0);
          rise = A.SearchRiseSet(A.Body.Moon, obs, +1, dayStart, 1);
          set = A.SearchRiseSet(A.Body.Moon, obs, -1, dayStart, 1);
        }
      } catch (_) {}

      const vsAvg = Number.isFinite(ang)
        ? ((ang - AVG_ANG_ARCMIN) / AVG_ANG_ARCMIN) * 100
        : NaN;
      const maxAng = yearMaxAngular(A, when);
      const vsMax = Number.isFinite(ang) && maxAng > 0 ? (ang / maxAng) * 100 : NaN;

      return {
        name: info.name || "—",
        frac,
        phase01,
        cycleDay: phase01 * SYNODIC,
        daysToFull,
        distMi: distKm * MI_PER_KM,
        ang,
        vsAvg,
        vsMax,
        rise: rise ? rise.date : null,
        set: set ? set.date : null,
        when,
      };
    }

    function paintMetrics(info) {
      const m = computeMetrics(info);
      if (!m) return;

      el.phase.textContent = m.name;
      el.illum.textContent = Number.isFinite(m.frac)
        ? `${Math.round(m.frac * 100)}%`
        : "—";
      el.cycle.textContent = `${m.cycleDay.toFixed(1)}/${SYNODIC.toFixed(1)}`;
      el.tofull.textContent = Number.isFinite(m.daysToFull)
        ? `${m.daysToFull.toFixed(1)} days`
        : "—";
      el.dist.textContent = Number.isFinite(m.distMi)
        ? `${Math.round(m.distMi).toLocaleString()} mi`
        : "—";
      el.ang.textContent = Number.isFinite(m.ang) ? `${m.ang.toFixed(1)}′` : "—";
      if (Number.isFinite(m.vsAvg)) {
        const s = m.vsAvg >= 0 ? "+" : "";
        el.vsavg.textContent = `${s}${m.vsAvg.toFixed(0)}%`;
      } else {
        el.vsavg.textContent = "—";
      }
      el.vsmax.textContent = Number.isFinite(m.vsMax)
        ? `${m.vsMax.toFixed(0)}% · yr`
        : "—";
      el.rise.textContent = fmtTime(m.rise);
      el.set.textContent = fmtTime(m.set);

      if (previewMode) {
        cycleDate.innerHTML = `${fmtDateTime(m.when)}<span class="live-tag">Preview</span>`;
      } else {
        cycleDate.innerHTML = `${fmtDateTime(m.when)}<span class="live-tag">Live · v88</span>`;
      }

      // Always nearest NOAA prediction station for observer lat/lon
      updateTides(Number(info.lat), Number(info.lon), m.when);
    }

    function showPhase(info) {
      if (!info) return;
      if (metricsRaf) cancelAnimationFrame(metricsRaf);
      metricsRaf = requestAnimationFrame(() => {
        metricsRaf = 0;
        paintMetrics(info);
      });
    }

    function showLoc(lat, lon) {
      latInput.value = Number(lat).toFixed(4);
      lonInput.value = Number(lon).toFixed(4);
      locCoords.textContent = `${fmtCoord(lat, "N", "S")} · ${fmtCoord(lon, "E", "W")}`;
      const south = Number(lat) < 0;
      hemiN.classList.toggle("active", !south);
      hemiS.classList.toggle("active", south);
    }

    function setHemisphere(southern) {
      const latAbs = Math.abs(Number(latInput.value) || 35);
      const lon = Number(lonInput.value) || 0;
      const lat = southern ? -latAbs : latAbs;
      applyLocation(lat, lon, "hemi");
      if (!previewMode) goLive();
    }

    function setLiveUI() {
      liveBtn.classList.toggle("is-preview", previewMode);
      liveBtn.classList.toggle("is-live", !previewMode);
      liveBtn.textContent = previewMode ? "Use live" : "Live";
    }

    function goLive() {
      previewMode = false;
      sliderAnchorDate = null;
      editPanel.classList.remove("is-open");
      editPanel.hidden = true;
      const now = new Date();
      const p = livePhase01(now);
      phaseSlider.value = String(Math.round(p * 1000));
      globe.setTime(now, { lockOrient: false });
      globe.resetView();
      showPhase(globe.getPhaseInfo());
      setLiveUI();
    }

    function ensureSliderAnchor() {
      if (sliderAnchorDate) return;
      const now = new Date();
      sliderAnchorDate = previewMode
        ? globe.getPhaseInfo()?.when || now
        : now;
      sliderAnchorPhase = previewMode
        ? Number(phaseSlider.value) / 1000
        : livePhase01(sliderAnchorDate);
    }

    let redModeOn = false;
    const visionBtn = document.getElementById("vision-btn");

    function setRedMode(on) {
      redModeOn = !!on;
      document.body.classList.toggle("is-red-mode", redModeOn);
      // Label = what you get when you press (next action)
      visionBtn.textContent = redModeOn ? "White" : "Red";
      visionBtn.setAttribute("aria-pressed", redModeOn ? "true" : "false");
      visionBtn.title = redModeOn
        ? "Return to normal (white) display"
        : "Night vision: red display for dark-adapted eyes";
    }

    function toggleRedMode() {
      setRedMode(!redModeOn);
    }

    visionBtn.addEventListener("click", (e) => {
      e.preventDefault();
      toggleRedMode();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!locDialog.hidden) {
        closeLocationDialog();
        return;
      }
      if (redModeOn) setRedMode(false);
    });

    const globe = createMoonGlobe(canvas, {
      onReady() {
        canvas.classList.add("is-ready");
        status.textContent = "";
        status.style.display = "none";
      },
      onQuality() {
        /* quality upgrades stay silent */
      },
      onPhase: showPhase,
    });

    function applyLocation(lat, lon, source) {
      globe.setObserver(lat, lon);
      if (!previewMode) {
        globe.setTime(new Date(), { lockOrient: false });
      } else {
        const phase = Number(phaseSlider.value) / 1000;
        ensureSliderAnchor();
        globe.setTime(
          dateFromPhaseOffset(sliderAnchorDate, sliderAnchorPhase, phase),
          { lockOrient: true, orientDate: new Date() }
        );
      }
      showLoc(lat, lon);
      showPhase(globe.getPhaseInfo());
      saveLoc(lat, lon, source);
    }

    phaseSlider.addEventListener("pointerdown", ensureSliderAnchor);
    phaseSlider.addEventListener("pointerup", () => {
      sliderAnchorDate = null;
    });
    phaseSlider.addEventListener("pointercancel", () => {
      sliderAnchorDate = null;
    });

    phaseSlider.addEventListener("input", () => {
      ensureSliderAnchor();
      previewMode = true;
      setLiveUI();
      const phase = Number(phaseSlider.value) / 1000;
      const date = dateFromPhaseOffset(
        sliderAnchorDate,
        sliderAnchorPhase,
        phase
      );
      if (previewRaf) cancelAnimationFrame(previewRaf);
      previewRaf = requestAnimationFrame(() => {
        previewRaf = 0;
        globe.setTime(date, { lockOrient: true, orientDate: new Date() });
        showPhase(globe.getPhaseInfo());
      });
    });

    liveBtn.addEventListener("click", goLive);
    hemiN.addEventListener("click", () => setHemisphere(false));
    hemiS.addEventListener("click", () => setHemisphere(true));

    function updateMapCoordsDisplay() {
      locMapCoords.textContent = `${fmtCoord(pickLat, "N", "S")} · ${fmtCoord(pickLon, "E", "W")}`;
    }

    function setMapPin(lat, lon, pan = false) {
      pickLat = lat;
      pickLon = lon;
      updateMapCoordsDisplay();
      if (!locationMap || typeof L === "undefined") return;
      if (!locationMarker) {
        locationMarker = L.marker([lat, lon], { draggable: true }).addTo(
          locationMap
        );
        locationMarker.on("dragend", () => {
          const p = locationMarker.getLatLng();
          setMapPin(p.lat, p.lng);
        });
      } else {
        locationMarker.setLatLng([lat, lon]);
      }
      if (pan) locationMap.setView([lat, lon], locationMap.getZoom());
    }

    function initLocationMap() {
      if (locationMap || typeof L === "undefined") return;
      locationMap = L.map(locMapEl, {
        zoomControl: true,
        attributionControl: true,
      });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap",
      }).addTo(locationMap);
      locationMap.on("click", (e) => setMapPin(e.latlng.lat, e.latlng.lng));
    }

    function closeLocationDialog() {
      locDialog.hidden = true;
    }

    function openLocationDialog() {
      const startLat = Number(latInput.value);
      const startLon = Number(lonInput.value);
      pickLat = Number.isFinite(startLat) ? startLat : 0;
      pickLon = Number.isFinite(startLon) ? startLon : 0;
      locDialog.hidden = false;
      requestAnimationFrame(() => {
        initLocationMap();
        if (!locationMap) return;
        const hasLoc =
          Number.isFinite(startLat) &&
          Number.isFinite(startLon) &&
          !(startLat === 0 && startLon === 0);
        const zoom = hasLoc ? 10 : 3;
        locationMap.setView([pickLat, pickLon], zoom);
        setMapPin(pickLat, pickLon);
        locationMap.invalidateSize();
      });
    }

    editBtn.addEventListener("click", () => openLocationDialog());
    locDialogCancel.addEventListener("click", () => closeLocationDialog());
    locDialog.addEventListener("click", (e) => {
      // Tap dimmed backdrop (not the sheet) closes
      if (e.target === locDialog) closeLocationDialog();
    });
    locDialogUse.addEventListener("click", () => {
      if (!Number.isFinite(pickLat) || !Number.isFinite(pickLon)) return;
      applyLocation(pickLat, pickLon, "map");
      closeLocationDialog();
      if (!previewMode) goLive();
    });

    geoBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        locCoords.textContent = "GPS unavailable";
        openLocationDialog();
        return;
      }
      locCoords.textContent = "Locating…";
      geoBtn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          geoBtn.disabled = false;
          applyLocation(pos.coords.latitude, pos.coords.longitude, "gps");
        },
        (err) => {
          geoBtn.disabled = false;
          locCoords.textContent =
            err.code === 1 ? "Permission denied" : "Location failed";
          openLocationDialog();
        },
        { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 }
      );
    });

    const saved = loadSavedLoc();
    if (saved) {
      applyLocation(saved.lat, saved.lon, "saved");
    } else {
      applyLocation(0, 0, "default");
    }
    goLive();

    if (!saved && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) =>
          applyLocation(pos.coords.latitude, pos.coords.longitude, "gps"),
        () => {},
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 }
      );
    }

    setInterval(() => {
      if (previewMode) return;
      globe.setTime(new Date(), { lockOrient: false });
      const p = livePhase01();
      phaseSlider.value = String(Math.round(p * 1000));
      showPhase(globe.getPhaseInfo());
    }, 60000);

    function onResize() {
      globe.fitToHost();
    }
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", () => {
      setTimeout(onResize, 150);
      setTimeout(onResize, 400);
    });
    window.visualViewport?.addEventListener("resize", onResize);
    requestAnimationFrame(() => {
      onResize();
      requestAnimationFrame(onResize);
    });
  </script>
</body>
</html>
